<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>语法俱乐部</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <aside class="sidebar" aria-label="章节目录">
        <div class="brand">
          <span>Grammar Club</span>
          <strong>语法俱乐部</strong>
        </div>
        <nav id="chapterList" class="chapter-list"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <button id="menuButton" class="icon-button" type="button" aria-label="打开目录">☰</button>
          <div>
            <span id="sectionLabel">学习</span>
            <strong id="currentTitle">语法俱乐部</strong>
          </div>
          <button id="searchButton" class="icon-button" type="button" aria-label="搜索">⌕</button>
        </header>

        <section id="dashboard" class="dashboard"></section>

        <section id="searchPanel" class="search-panel" hidden>
          <label>
            <span>搜索语法点或例句</span>
            <input id="searchInput" type="search" autocomplete="off" placeholder="例如：时态、关系从句、倒装" />
          </label>
          <div id="searchResults" class="search-results"></div>
        </section>

        <article id="content" class="content" aria-live="polite"></article>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
